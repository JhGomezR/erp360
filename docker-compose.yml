services:

  # ── Nginx (proxy interno → backend FPM + frontend) ─────────────────────────
  # Traefik maneja 80/443 externamente; nginx no publica puertos.
  # La config está baked en la imagen para evitar problemas de volume mount.
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - backend_storage:/var/www/storage:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      # Traefik ya maneja HTTP→HTTPS globalmente; solo definir el router HTTPS
      - "traefik.http.routers.atlas.rule=Host(`atlaserp.com.co`) || Host(`www.atlaserp.com.co`)"
      - "traefik.http.routers.atlas.entrypoints=websecure"
      - "traefik.http.routers.atlas.tls=true"
      - "traefik.http.routers.atlas.tls.certresolver=mytlschallenge"
      - "traefik.http.services.atlas.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backend Laravel (PHP-FPM) ───────────────────────────────────────────────
  backend:
    build:
      context: ./atlas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: fpm
    env_file:
      - ./atlas-backend/.env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - atlas_net
      - postgres_net
      - traefik_net
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Queue Worker ────────────────────────────────────────────────────────────
  queue:
    build:
      context: ./atlas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: queue
    env_file:
      - ./atlas-backend/.env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlas_net
      - postgres_net

  # ── Scheduler (cron) ────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./atlas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: scheduler
    env_file:
      - ./atlas-backend/.env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - atlas_net
      - postgres_net

  # ── Reverb (WebSocket server) ───────────────────────────────────────────────
  reverb:
    build:
      context: ./atlas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: reverb
    env_file:
      - ./atlas-backend/.env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlas_net
      - postgres_net
      - traefik_net

  # ── Frontend Next.js ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./atlas-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:          ${NEXT_PUBLIC_API_URL:-https://atlaserp.com.co/api}
        NEXT_PUBLIC_REVERB_HOST:      ${NEXT_PUBLIC_REVERB_HOST:-atlaserp.com.co}
        NEXT_PUBLIC_REVERB_PORT:      ${NEXT_PUBLIC_REVERB_PORT:-443}
        NEXT_PUBLIC_REVERB_APP_KEY:   ${NEXT_PUBLIC_REVERB_APP_KEY:-atlas-erp-prod}
        NEXT_PUBLIC_REVERB_SCHEME:    ${NEXT_PUBLIC_REVERB_SCHEME:-https}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # URL interna Docker para fetches SSR — evita hairpin NAT en producción.
      # El contenedor frontend llama a nginx directamente sin salir a internet.
      INTERNAL_API_URL: http://nginx/api
    networks:
      - atlas_net
      - traefik_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - atlas_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Volúmenes ──────────────────────────────────────────────────────────────────
volumes:
  backend_storage:
  redis_data:

# ── Redes ──────────────────────────────────────────────────────────────────────
networks:
  atlas_net:
    driver: bridge

  # Red de Traefik en Hostinger (comparte red con otros contenedores del panel)
  traefik_net:
    external: true
    name: ${TRAEFIK_NETWORK:-root_default}

  # Red del PostgreSQL existente
  postgres_net:
    external: true
    name: ${POSTGRES_NETWORK:-postgresql-ctu2_default}
