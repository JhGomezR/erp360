services:

  # ── Nginx (proxy reverso) ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Para primera puesta en marcha (sin SSL): usar atlas-http.conf
      # Una vez con SSL: cambiar a atlas.conf
      - ./nginx/conf.d/atlas-http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_storage:/var/www/storage:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - atlas_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backend Laravel (PHP-FPM) ───────────────────────────────────────────────
  backend:
    build:
      context: ./atlas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: fpm
    env_file:
      - ./atlas-backend/.env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - atlas_net
      - postgres_net
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Queue Worker ────────────────────────────────────────────────────────────
  queue:
    build:
      context: ./atlas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: queue
    env_file:
      - ./atlas-backend/.env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlas_net
      - postgres_net

  # ── Scheduler (cron) ────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./atlas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: scheduler
    env_file:
      - ./atlas-backend/.env
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - atlas_net
      - postgres_net

  # ── Reverb (WebSocket server) ───────────────────────────────────────────────
  reverb:
    build:
      context: ./atlas-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: reverb
    env_file:
      - ./atlas-backend/.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlas_net
      - postgres_net

  # ── Frontend Next.js ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./atlas-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:          ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_REVERB_HOST:      ${NEXT_PUBLIC_REVERB_HOST}
        NEXT_PUBLIC_REVERB_PORT:      ${NEXT_PUBLIC_REVERB_PORT}
        NEXT_PUBLIC_REVERB_APP_KEY:   ${NEXT_PUBLIC_REVERB_APP_KEY}
        NEXT_PUBLIC_REVERB_SCHEME:    ${NEXT_PUBLIC_REVERB_SCHEME}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - atlas_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - atlas_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Volúmenes ──────────────────────────────────────────────────────────────────
volumes:
  backend_storage:
  redis_data:

# ── Redes ──────────────────────────────────────────────────────────────────────
networks:
  atlas_net:
    driver: bridge

  # Red del PostgreSQL existente — cambiar el nombre según tu setup
  postgres_net:
    external: true
    name: ${POSTGRES_NETWORK:-postgres_default}
