; supervisor-reverb.conf
; Configuración de Supervisor para mantener Reverb activo en producción (Linux).
;
; Instalación:
;   sudo cp scripts/supervisor-reverb.conf /etc/supervisor/conf.d/atlas-reverb.conf
;   sudo supervisorctl reread
;   sudo supervisorctl update
;   sudo supervisorctl start atlas-reverb
;
; Ajusta 'directory' y 'user' según tu entorno.

[program:atlas-reverb]
command=php artisan reverb:start --port=8081
directory=/var/www/atlas-backend
user=www-data
autostart=true
autorestart=true
startsecs=3
startretries=10
redirect_stderr=true
stdout_logfile=/var/log/supervisor/atlas-reverb.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
environment=APP_ENV="production"
