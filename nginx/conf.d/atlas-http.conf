# ── Configuración SIN SSL (para primera puesta en marcha) ─────────────────────
# Usar este archivo mientras no tengas certificado SSL configurado.
# Una vez tengas SSL, eliminar este archivo y renombrar atlas.conf → activo.
#
# Para activar: en docker-compose.yml cambia el volumen de nginx a:
#   - ./nginx/conf.d/atlas-http.conf:/etc/nginx/conf.d/default.conf
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name atlaserp.com.co www.atlaserp.com.co;

    client_max_body_size 15M;

    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /storage/ {
        alias /var/www/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ ^/(api|health|sanctum|broadcasting)(/|$) {
        fastcgi_pass         backend:9000;
        fastcgi_index        index.php;
        fastcgi_param        SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param        REQUEST_URI     $request_uri;
        fastcgi_param        SERVER_NAME     $host;
        fastcgi_read_timeout 120;
        include              fastcgi_params;
    }

    location /app/ {
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass             http://frontend:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade         $http_upgrade;
        proxy_set_header       Connection      "upgrade";
        proxy_set_header       Host            $host;
        proxy_set_header       X-Real-IP       $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout     60s;
    }
}
