name: CI / CD — Full Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Pruebas nocturnas completas (load/stress/E2E) — 02:00 UTC
    - cron: '0 2 * * *'

# Cancela runs anteriores del mismo branch/PR al hacer nuevo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://atlaserp.com.co
  # Opt-in a Node 24 para acciones JavaScript (Node 20 deprecated 2026-09-16)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ══════════════════════════════════════════════════════════════════════════════
# BACKEND — PHPUnit: Unit + Feature + Security + Performance
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  test-unit:
    name: "Backend — Unit Tests (Caja Blanca)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, sqlite3, bcmath, ctype, fileinfo, json, mbstring, openssl, tokenizer, xml
          coverage: xdebug
          ini-values: memory_limit=512M

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: atlas-backend/vendor
          key: composer-${{ hashFiles('atlas-backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Prepare .env
        run: |
          cp .env.example .env
          sed -i 's|^DB_CONNECTION=.*|DB_CONNECTION=sqlite|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=:memory:|' .env
          sed -i 's|^DB_HOST=.*|DB_HOST=|' .env
          php artisan key:generate --no-interaction

      - name: Run Unit Tests
        run: php artisan test --testsuite=Unit --coverage-clover=coverage/unit.xml
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: atlas-backend/coverage/unit.xml

  # ─────────────────────────────────────────────────────────────────────────
  test-feature:
    name: "Backend — Feature/Integration Tests (Caja Negra API)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atlas_test
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, bcmath, ctype, fileinfo, json, mbstring, openssl, tokenizer, xml
          coverage: none
          ini-values: memory_limit=512M

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: atlas-backend/vendor
          key: composer-${{ hashFiles('atlas-backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Prepare .env
        run: |
          cp .env.example .env
          sed -i 's|^DB_CONNECTION=.*|DB_CONNECTION=pgsql|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=atlas_test|' .env
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_PORT=.*|DB_PORT=5432|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=atlas|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=secret|' .env
          sed -i 's|^CACHE_STORE=.*|CACHE_STORE=array|' .env
          php artisan key:generate --no-interaction

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Feature Tests (Rate Limiting + API)
        run: php artisan test --testsuite=Feature --no-coverage
        env:
          DB_CONNECTION: pgsql
          DB_DATABASE: atlas_test
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USERNAME: atlas
          DB_PASSWORD: secret

  # ─────────────────────────────────────────────────────────────────────────
  test-security-phpunit:
    name: "Backend — Security Tests (XSS, SQLi, Auth, IDOR)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atlas_test
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, bcmath, ctype, fileinfo, json, mbstring, openssl, tokenizer, xml
          coverage: none
          ini-values: memory_limit=512M

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: atlas-backend/vendor
          key: composer-${{ hashFiles('atlas-backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Prepare .env
        run: |
          cp .env.example .env
          sed -i 's|^DB_CONNECTION=.*|DB_CONNECTION=pgsql|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=atlas_test|' .env
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_PORT=.*|DB_PORT=5432|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=atlas|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=secret|' .env
          sed -i 's|^CACHE_STORE=.*|CACHE_STORE=array|' .env
          php artisan key:generate --no-interaction

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Security Tests
        run: php artisan test --testsuite=Security --no-coverage
        env:
          DB_CONNECTION: pgsql
          DB_DATABASE: atlas_test
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USERNAME: atlas
          DB_PASSWORD: secret

      - name: Upload security test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: atlas-backend/storage/logs/

  # ─────────────────────────────────────────────────────────────────────────
  test-performance-phpunit:
    name: "Backend — Performance/SLA Tests (Response Time)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atlas_test
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, bcmath, ctype, fileinfo, json, mbstring, openssl, tokenizer, xml
          coverage: none
          ini-values: memory_limit=512M

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: atlas-backend/vendor
          key: composer-${{ hashFiles('atlas-backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Prepare .env
        run: |
          cp .env.example .env
          sed -i 's|^DB_CONNECTION=.*|DB_CONNECTION=pgsql|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=atlas_test|' .env
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_PORT=.*|DB_PORT=5432|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=atlas|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=secret|' .env
          sed -i 's|^CACHE_STORE=.*|CACHE_STORE=array|' .env
          php artisan key:generate --no-interaction

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Performance Tests (SLA thresholds)
        run: php artisan test --testsuite=Performance --no-coverage
        env:
          DB_CONNECTION: pgsql
          DB_DATABASE: atlas_test
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USERNAME: atlas
          DB_PASSWORD: secret

# ══════════════════════════════════════════════════════════════════════════════
# FRONTEND — ESLint + TypeScript + Build
# ══════════════════════════════════════════════════════════════════════════════
  lint-frontend:
    name: "Frontend — ESLint + TypeScript + Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: atlas-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint (calidad de código)
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true  # Advertencia, no bloqueo hasta que todos los tipos estén limpios

      - name: Build check (Next.js)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://atlaserp.com.co/api
          NEXT_PUBLIC_REVERB_HOST: atlaserp.com.co
          NEXT_PUBLIC_REVERB_PORT: '443'
          NEXT_PUBLIC_REVERB_SCHEME: https
          NEXT_PUBLIC_REVERB_APP_KEY: ci-build

# ══════════════════════════════════════════════════════════════════════════════
# SECURITY AUDIT — Dependencias (CVE check)
# ══════════════════════════════════════════════════════════════════════════════
  security-audit:
    name: "Security Audit — CVE en dependencias"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Composer security audit
        working-directory: atlas-backend
        run: composer audit
        continue-on-error: true  # Informativo — reporta CVEs sin bloquear deploy

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend deps (para audit)
        working-directory: atlas-frontend
        run: npm ci

      - name: NPM security audit (critical only — bloquea en crítico)
        working-directory: atlas-frontend
        run: npm audit --audit-level=critical
        continue-on-error: true  # high/moderate son informativos; crítico sería bloqueante

      - name: NPM audit report completo (informativo)
        working-directory: atlas-frontend
        run: npm audit --audit-level=high || true

# ══════════════════════════════════════════════════════════════════════════════
# E2E — Playwright: Funcional, Regresión, Seguridad, Alfa/Beta
# Solo en push a master y nightly — no en PRs (requiere producción)
# ══════════════════════════════════════════════════════════════════════════════
  test-e2e:
    name: "E2E — Playwright (${{ matrix.project }})"
    needs: [test-unit, test-feature, test-security-phpunit, lint-frontend]
    if: |
      (github.ref == 'refs/heads/master' && github.event_name == 'push') ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true  # Targets producción — informativo hasta que el deploy esté configurado

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, mobile-android]
        # mobile-ios (WebKit) se ejecuta solo en nightly
        include:
          - project: mobile-ios
            nightly_only: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: |
          # Crear package.json si no existe
          if [ ! -f package.json ]; then
            npm init -y
          fi
          npm install --save-dev @playwright/test

      - name: Install Playwright browsers (${{ matrix.project }})
        working-directory: tests/e2e
        run: |
          case "${{ matrix.project }}" in
            chromium)    npx playwright install chromium --with-deps ;;
            firefox)     npx playwright install firefox --with-deps ;;
            mobile-android) npx playwright install chromium --with-deps ;;
            mobile-ios)  npx playwright install webkit --with-deps ;;
          esac

      - name: Run E2E — Funcional + Regresión (@functional @regression)
        working-directory: tests/e2e
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            --grep="@functional|@regression|@alpha|@beta" \
            --reporter=list,json \
            --output=results/
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_TYPE: ""
          # Credenciales contra producción — defaults en tests/e2e/_credentials.ts
          E2E_SUPER_EMAIL:              ${{ secrets.E2E_SUPER_EMAIL }}
          E2E_SUPER_PASSWORD:           ${{ secrets.E2E_SUPER_PASSWORD }}
          E2E_TENANT_DEMO_SLUG:         ${{ secrets.E2E_TENANT_DEMO_SLUG }}
          E2E_TENANT_DEMO_EMAIL:        ${{ secrets.E2E_TENANT_DEMO_EMAIL }}
          E2E_TENANT_DEMO_PASSWORD:     ${{ secrets.E2E_TENANT_DEMO_PASSWORD }}
          E2E_TENANT_REST_SLUG:         ${{ secrets.E2E_TENANT_REST_SLUG }}
          E2E_TENANT_REST_EMAIL:        ${{ secrets.E2E_TENANT_REST_EMAIL }}
          E2E_TENANT_REST_PASSWORD:     ${{ secrets.E2E_TENANT_REST_PASSWORD }}
          E2E_TENANT_PHARMACY_SLUG:     ${{ secrets.E2E_TENANT_PHARMACY_SLUG }}
          E2E_TENANT_PHARMACY_EMAIL:    ${{ secrets.E2E_TENANT_PHARMACY_EMAIL }}
          E2E_TENANT_PHARMACY_PASSWORD: ${{ secrets.E2E_TENANT_PHARMACY_PASSWORD }}

      - name: Run E2E — Seguridad (@security)
        working-directory: tests/e2e
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            --grep="@security" \
            --reporter=list,json \
            --output=results/security/
        env:
          BASE_URL: ${{ env.BASE_URL }}
          E2E_TENANT_DEMO_EMAIL:    ${{ secrets.E2E_TENANT_DEMO_EMAIL }}
          E2E_TENANT_DEMO_PASSWORD: ${{ secrets.E2E_TENANT_DEMO_PASSWORD }}
        continue-on-error: true  # Seguridad: documenta sin bloquear siempre

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.project }}
          path: tests/e2e/results/
          retention-days: 30

      - name: Upload E2E screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.project }}
          path: tests/e2e/test-results/
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# LOAD TESTS — k6: Smoke (en cada push), Load/Stress (nightly)
# ══════════════════════════════════════════════════════════════════════════════
  test-smoke-k6:
    name: "Load — k6 Smoke Test (sanity check)"
    needs: [test-unit, test-feature, lint-frontend]
    if: |
      (github.ref == 'refs/heads/master' && github.event_name == 'push') ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Targets producción — informativo hasta que el deploy esté configurado

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: k6 Smoke Test (1 VU, 30s — sanity)
        run: k6 run tests/load/smoke.js --env BASE_URL=${{ env.BASE_URL }}

      - name: Upload smoke results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-smoke-results
          path: tests/load/results/

  # ─────────────────────────────────────────────────────────────────────────
  test-load-k6:
    name: "Load — k6 Load Test (50 VUs — nightly only)"
    needs: [test-smoke-k6]
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: k6 Load Test (50 VUs, flujo completo de auth)
        run: k6 run tests/load/load.js --env BASE_URL=${{ env.BASE_URL }}

      - name: Upload load results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-results
          path: tests/load/results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  test-security-load-k6:
    name: "Load — k6 Security Load (Brute Force Rate Limit — nightly)"
    needs: [test-smoke-k6]
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: k6 Security — Brute Force Rate Limit Test
        run: k6 run tests/load/security_load.js --env BASE_URL=${{ env.BASE_URL }}
        continue-on-error: true  # Documenta el estado actual del rate limiting

      - name: Upload security load results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-security-load-results
          path: tests/load/results/

  # ─────────────────────────────────────────────────────────────────────────
  test-stress-k6:
    name: "Load — k6 Stress Test (hasta 400 VUs — nightly)"
    needs: [test-load-k6]
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: k6 Stress Test (escalada hasta 400 VUs — busca punto de quiebre)
        run: k6 run tests/load/stress.js --env BASE_URL=${{ env.BASE_URL }}
        continue-on-error: true  # Estrés puede fallar por diseño (busca límite)

      - name: Upload stress results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-stress-results
          path: tests/load/results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  test-spike-k6:
    name: "Load — k6 Spike Test (0→500 VUs — nightly)"
    needs: [test-load-k6]
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: k6 Spike Test (pico viral 0→500 VUs en 10s)
        run: k6 run tests/load/spike.js --env BASE_URL=${{ env.BASE_URL }}
        continue-on-error: true  # Spike puede fallar — es el objetivo encontrar el límite

      - name: Upload spike results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-spike-results
          path: tests/load/results/

# ══════════════════════════════════════════════════════════════════════════════
# DEPLOY — Solo después de que pasan todos los tests críticos
# ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: "Deploy → Production"
    needs:
      - test-unit
      - test-feature
      - test-security-phpunit
      - lint-frontend
      - security-audit
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    continue-on-error: true  # No bloquear el workflow si los secrets SSH aún no están configurados
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}

    steps:
      - name: Verificar configuración SSH
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "::warning::Secrets SSH no configurados — omitiendo deploy. Configura SSH_HOST, SSH_USER, SSH_KEY, SSH_PORT, DEPLOY_PATH en Settings → Secrets para habilitar el deploy."
          else
            echo "SSH_HOST configurado — el siguiente paso ejecutará el deploy."
          fi

      - name: Deploy via SSH
        if: env.SSH_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            chmod +x deploy.sh
            ./deploy.sh
            echo "Deploy completado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

# ══════════════════════════════════════════════════════════════════════════════
# REPORT — Resumen consolidado de la suite completa (nightly)
# ══════════════════════════════════════════════════════════════════════════════
  report:
    name: "Test Report — Resumen Consolidado"
    needs:
      - test-unit
      - test-feature
      - test-security-phpunit
      - test-performance-phpunit
      - lint-frontend
      - security-audit
    if: always() && github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Generate test summary
        run: |
          echo "## 🧪 Atlas ERP — Reporte de Suite Completa" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Tipo | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PHPUnit Unit | Caja Blanca | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPUnit Feature | Integración API | ${{ needs.test-feature.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPUnit Security | XSS/SQLi/IDOR | ${{ needs.test-security-phpunit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHPUnit Performance | SLA/Response Time | ${{ needs.test-performance-phpunit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint + Build | Frontend | ${{ needs.lint-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Composer/NPM Audit | CVE Deps | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Fecha: $(date -u '+%Y-%m-%d %H:%M UTC')_" >> $GITHUB_STEP_SUMMARY
